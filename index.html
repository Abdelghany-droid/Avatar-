
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Shutter Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
        
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body {
            background-color: #0d0221;
            color: #e0e0e0;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: manipulation;
            height: 100vh;
            width: 100vw;
        }

        .font-futuristic {
            font-family: 'Orbitron', sans-serif;
        }

        #root {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Enforce portrait ratio container on desktop screens */
        @media (min-aspect-ratio: 1/1) {
            #root {
                max-width: 480px;
                max-height: 850px;
                margin: auto;
                border: 2px solid rgba(168, 85, 247, 0.3);
                border-radius: 20px;
                position: relative;
                box-shadow: 0 0 50px rgba(0,0,0,0.8), 0 0 20px rgba(168, 85, 247, 0.1);
                overflow: hidden;
            }
            body {
                display: flex;
                align-items: center;
                justify-content: center;
                background: radial-gradient(circle at center, #1a0b2e 0%, #05010d 100%);
            }
        }
        
        .neon-text {
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.8), 0 0 20px rgba(168, 85, 247, 0.4);
        }

        .neon-border {
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.5), inset 0 0 15px rgba(168, 85, 247, 0.5);
            border: 2px solid rgba(168, 85, 247, 0.8);
        }

        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer-anim 2s infinite;
        }

        @keyframes shimmer-anim {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .gradient-bg {
            background: radial-gradient(circle at center, #2d004d 0%, #0d0221 100%);
        }

        .top-safe-8 {
            top: calc(2rem + var(--safe-top));
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "framer-motion": "https://esm.sh/framer-motion@^12.34.0",
    "qrcode.react": "https://esm.sh/qrcode.react@^4.2.0"
  }
}
</script>
</head>
<body class="gradient-bg">
    <div id="root"></div>
</body>
</html>
